<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>交界地 Crossing - 视觉测试版</title>
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0a; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg); color: #e0e0e0; font-family: serif; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        /* --- 重点：图片框视觉强化 --- */
        #res-img-container {
            width: 100%; 
            min-height: 220px; /* 强制撑开高度 */
            margin-bottom: 20px;
            border: 2px dashed #ff0000; /* 红色虚线，看到它就说明框在！ */
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #res-img-container::before {
            content: "图片载入位置 (Image Slot)";
            color: #555;
            font-size: 0.8rem;
            position: absolute;
        }
        #res-img {
            width: 100%; 
            z-index: 2;
            display: block;
            opacity: 0;
            transition: opacity 0.5s;
        }
        /* ----------------------- */

        #game-ui, #result-screen { display: none; }
        .role-title { font-size: 1.8rem; color: var(--gold); margin: 10px 0; text-align: center;}
        .option-btn { background: rgba(255,255,255,0.08); border: 1px solid var(--gold); color: #ccc; padding: 15px; margin: 5px 0; width: 100%; text-align: left;}
        #question-text { text-align: center; font-size: 1.1rem; margin: 40px 0; min-height: 60px;}
    </style>
</head>
<body>

<div class="container">
    <button id="debug-btn" style="position:fixed; top:10px; right:10px; z-index:999; padding:5px; font-size:10px; opacity:0.5;" onclick="showResult('pgm')">点此强制看结果页</button>

    <div id="game-ui" style="display:block;">
        <div id="question-text">正在初始化...</div>
        <div id="option-list"></div>
    </div>

    <div id="result-screen">
        <div id="res-img-container">
            <img id="res-img" src="" alt="灵魂卡片">
        </div>
        
        <div class="role-title" id="res-role"></div>
        <p id="res-analysis" style="font-size: 0.9rem; line-height: 1.6; padding: 0 10px;"></p>
        <button class="option-btn" onclick="location.reload()" style="text-align:center;">重新测试</button>
    </div>
</div>

<script>
    // 简版逻辑仅供测试图片显示
    const results = {
        pgm: { role: "PGM 契约者", analysis: "测试文本：如果你看到红虚线框里是黑的，说明 pgm.jpg 没找着。" },
        classical: { role: "古典占星师", analysis: "测试文本：检查 classical.jpg 是否在根目录。" }
    };

    function showResult(forcedType) {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        const winner = forcedType || "pgm";
        const res = results[winner];
        
        document.getElementById('res-role').innerText = res.role;
        document.getElementById('res-analysis').innerText = res.analysis;

        // 加载图片
        const img = document.getElementById('res-img');
        const ts = new Date().getTime();
        img.src = winner + ".jpg?v=" + ts;
        
        img.onload = function() {
            this.style.opacity = "1";
            document.getElementById('res-img-container').style.border = "1px solid #c5a059"; // 加载成功变回金边
        };
        img.onerror = function() {
            console.error("图片加载失败，请检查文件名是否为: " + winner + ".jpg");
        };
    }

    // 模拟第一题
    document.getElementById('question-text').innerText = "点击下方选项或右上角强制测试：";
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerText = "点我开始正常流程（需点10次）";
    btn.onclick = () => { alert('建议直接点右上角小字强制看结果页'); };
    document.getElementById('option-list').appendChild(btn);
</script>
</body>
</html>
